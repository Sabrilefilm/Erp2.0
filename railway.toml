[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
PHP_VERSION = "8.2"
NODE_VERSION = "18"
APP_NAME = "ERP 2.0"
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"

[[services]]
name = "app"

[services.build]
builder = "nixpacks"

[services.deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[services.env]
PHP_VERSION = "8.2"
NODE_VERSION = "18"
APP_NAME = "ERP 2.0"
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"
